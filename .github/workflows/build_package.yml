name: Build Python Package
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
  actions: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: python-package
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Install Cloudsmith CLI
        run: pip install cloudsmith
      - name: Build package
        run: python -m build
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: python-package
          path: dist/
          if-no-files-found: error
          retention-days: 5
      - name: Upload package to Cloudsmith
        run: |
          if ! ls dist/*.tar.gz 1> /dev/null 2>&1; then
            echo "No package found to upload"
            exit 1
          fi
          cloudsmith upload ...
