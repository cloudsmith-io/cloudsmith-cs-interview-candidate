name: Build Python Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: python-package
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: python-package
          path: dist/
          if-no-files-found: error
          retention-days: 5

  release:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: python-package

      - name: Publish to Cloudsmith
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          # Replace YOUR-ORG, YOUR-REPO, and YOUR-PACKAGE with actual values.
          curl -X PUT "https://api.cloudsmith.io/v1/packages/YOUR-ORG/YOUR-REPO/YOUR-PACKAGE/versions/YOUR-VERSION/" \
          -H "Authorization: Token $CLOUDSMITH_API_KEY" \
          -F "file=@dist/YOUR_PACKAGE_FILE.whl" \
          -F "metadata={\"version\": \"YOUR-VERSION\", \"description\": \"Your package description\"}"
